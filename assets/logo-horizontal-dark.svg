<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 275 100" width="275" height="100">
  <defs>
    <clipPath id="hd-left"><polygon points="12,30 48,48 48,84 12,66"/></clipPath>
    <clipPath id="hd-right"><polygon points="48,48 84,30 84,66 48,84"/></clipPath>
  </defs>
  <!-- Cube icon -->
  <polygon points="48,12 84,30 48,48 12,30" fill="#6ee7b7"/>
  <polygon points="12,30 48,48 48,84 12,66" fill="#064e3b"/>
  <polygon points="48,48 84,30 84,66 48,84" fill="#059669"/>
  <!-- "ya" on left face -->
  <g clip-path="url(#hd-left)">
    <g transform="matrix(1,0.5,0,1.2,0,0)">
      <text x="30" y="40.5" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="24" font-weight="900">
        <tspan fill="#6ee7b7">y</tspan><tspan fill="#fff" opacity="0.9">a</tspan>
      </text>
    </g>
  </g>
  <!-- "ge" on right face -->
  <g clip-path="url(#hd-right)">
    <g transform="matrix(1,-0.5,0,1.2,0,0)">
      <text x="66" y="80.5" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="24" font-weight="900" fill="#fff" opacity="0.9">ge</text>
    </g>
  </g>
  <!-- Wordmark — light for dark backgrounds -->
  <text x="110" y="65" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="56" font-weight="800" letter-spacing="-1.5" fill="#e2e8f0">yage</text>
</svg>
