<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <clipPath id="face-left"><polygon points="30,75 120,120 120,210 30,165"/></clipPath>
    <clipPath id="face-right"><polygon points="120,120 210,75 210,165 120,210"/></clipPath>
  </defs>
  <!-- Top face -->
  <polygon points="120,30 210,75 120,120 30,75" fill="#6ee7b7"/>
  <!-- Left face -->
  <polygon points="30,75 120,120 120,210 30,165" fill="#064e3b"/>
  <!-- Right face -->
  <polygon points="120,120 210,75 210,165 120,210" fill="#059669"/>
  <!-- "ya" on left face -->
  <g clip-path="url(#face-left)">
    <g transform="matrix(1,0.5,0,1.2,0,0)">
      <text x="75" y="101" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="60" font-weight="900">
        <tspan fill="#6ee7b7">y</tspan><tspan fill="#fff" opacity="0.9">a</tspan>
      </text>
    </g>
  </g>
  <!-- "ge" on right face -->
  <g clip-path="url(#face-right)">
    <g transform="matrix(1,-0.5,0,1.2,0,0)">
      <text x="165" y="201" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="60" font-weight="900" fill="#fff" opacity="0.9">ge</text>
    </g>
  </g>
</svg>
