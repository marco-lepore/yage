<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yet Another (Javascript) Game Engine</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        display: flex;
        flex-direction: row;
        width: 100%;
        background-color: black;
      }
      #list {
        flex: auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 24px;
      }
      #list a {
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
        color: white;
      }
      #frame-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex: 90%;
      }
      iframe {
        width: 640px;
        height: 640px;
      }
    </style>
  </head>
  <body>
    <div id="list">
      <a href="examples/bounce/" target="game">bounce</a>
      <a href="examples/loader/" target="game">loader</a>
      <a href="examples/animation/" target="game">animation</a>
      <a href="examples/input/" target="game">input</a>
      <a href="examples/particles/" target="game">particles</a>
      <a href="examples/dialogue/" target="game">dialogue</a>
      <a href="examples/animated-sprite/" target="game">animated sprite/</a>
    </div>
    <div id="frame-wrapper">
      <iframe seamless name="game"></iframe>
    </div>
  </body>
</html>
