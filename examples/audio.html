<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YAGE — Audio</title>
  </head>
  <body>
    <a class="back-link" href="/">&larr; All Examples</a>
    <h1>Audio</h1>
    <div id="game-container"></div>
    <div class="controls">
      <span><kbd>1</kbd> laser shot</span>
      <span><kbd>2</kbd> laser burst</span>
      <span><kbd>3</kbd> explosion</span>
      <span><kbd>R</kbd> random SFX</span>
      <span><kbd>M</kbd> toggle music</span>
      <span><kbd>Up/Down</kbd> music vol</span>
      <span><kbd>Left/Right</kbd> sfx vol</span>
      <span><kbd>Space</kbd> mute all</span>
    </div>
    <script type="module" src="/src/audio.ts"></script>
  </body>
</html>
